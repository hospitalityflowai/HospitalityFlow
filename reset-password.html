<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <meta name="description" content="Set a new password for your Hospitality Flow account.">
  <title>Reset password | Hospitality Flow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <header class="header" role="banner">
    <div class="container header-inner">
      <a href="index.html" class="logo" aria-label="Hospitality Flow home">Hospitality <span>Flow</span></a>
      <a href="login.html" class="header-link">Sign in</a>
    </div>
  </header>

  <main>
    <div class="container auth-layout">
      <div id="auth-loading" class="auth-loading" aria-live="polite">Verifying reset link…</div>

      <div id="auth-content" class="auth-content hidden">
        <h1 class="auth-heading">Reset password</h1>
        <p class="auth-lead">Choose a new password for your account. You will be signed out of other sessions after updating.</p>

        <div class="auth-card">
          <div id="auth-alert" class="auth-alert" aria-live="polite"></div>

          <div id="reset-invalid" class="hidden">
            <p class="account-note">Request a new reset link if this one has expired or already been used.</p>
            <a href="forgot-password.html" class="btn btn-primary">Request new reset link</a>
          </div>

          <form id="reset-form" novalidate>
            <div class="auth-form-group">
              <label for="reset-password">New password</label>
              <input type="password" id="reset-password" name="password" required autocomplete="new-password" minlength="8" placeholder="At least 8 characters">
            </div>
            <div class="auth-form-group">
              <label for="reset-password-confirm">Confirm new password</label>
              <input type="password" id="reset-password-confirm" name="password-confirm" required autocomplete="new-password" minlength="8" placeholder="Repeat your new password">
            </div>
            <button type="submit" class="btn btn-primary" id="reset-submit">Update password</button>
          </form>
        </div>

        <p class="auth-footer-text">Back to <a href="login.html">sign in</a></p>
      </div>
    </div>
  </main>

  <script src="js/supabase-config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script>HFAuth.initResetPasswordPage();</script>
</body>
</html>
