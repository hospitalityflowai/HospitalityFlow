<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <meta name="description" content="Reset your Hospitality Flow account password.">
  <title>Forgot password | Hospitality Flow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <header class="header" role="banner">
    <div class="container header-inner">
      <a href="index.html" class="logo" aria-label="Hospitality Flow home">Hospitality <span>Flow</span></a>
      <a href="login.html" class="header-link">Sign in</a>
    </div>
  </header>

  <main>
    <div class="container auth-layout">
      <div id="auth-loading" class="auth-loading" aria-live="polite">Checking session…</div>

      <div id="auth-content" class="auth-content hidden">
        <h1 class="auth-heading">Forgot password</h1>
        <p class="auth-lead">Enter the email address for your account and we will send you a secure link to reset your password.</p>

        <div class="auth-card">
          <div id="auth-alert" class="auth-alert" aria-live="polite"></div>

          <form id="forgot-form" novalidate>
            <div class="auth-form-group">
              <label for="forgot-email">Email address</label>
              <input type="email" id="forgot-email" name="email" required autocomplete="email" placeholder="you@yourhotel.com">
            </div>
            <button type="submit" class="btn btn-primary" id="forgot-submit">Send reset link</button>
          </form>
        </div>

        <p class="auth-footer-text">Remember your password? <a href="login.html">Back to sign in</a></p>
      </div>
    </div>
  </main>

  <script src="js/supabase-config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script>HFAuth.initForgotPasswordPage();</script>
</body>
</html>
