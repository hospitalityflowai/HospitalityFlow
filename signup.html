<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <meta name="description" content="Hospitality Flow account access is currently invitation-only.">
  <title>Invitation only | Hospitality Flow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <header class="header" role="banner">
    <div class="container header-inner">
      <a href="index.html" class="logo" aria-label="Hospitality Flow home">Hospitality <span>Flow</span></a>
      <a href="login.html" class="header-link">Sign in</a>
    </div>
  </header>

  <main>
    <div class="container auth-layout">
      <div id="auth-loading" class="auth-loading" aria-live="polite">Checking session…</div>

      <div id="auth-content" class="auth-content hidden">
        <h1 class="auth-heading">Create account</h1>
        <p class="auth-lead">Join Hospitality Flow with your work email address.</p>

        <div class="auth-card">
          <div id="auth-alert" class="auth-alert" aria-live="polite"></div>

          <div id="signup-invitation-only" class="hidden" hidden>
            <p class="account-note">If you have received an invitation, open the link in your email to set up your account, then sign in.</p>
            <a href="login.html" class="btn btn-primary">Go to sign in</a>
          </div>

          <form id="signup-form" novalidate>
            <div class="auth-form-group">
              <label for="signup-email">Work email address</label>
              <input type="email" id="signup-email" name="email" required autocomplete="email" placeholder="you@yourhotel.com">
            </div>
            <div class="auth-form-group">
              <label for="signup-password">Password</label>
              <input type="password" id="signup-password" name="password" required autocomplete="new-password" minlength="6" placeholder="At least 6 characters">
            </div>
            <div class="auth-form-group">
              <label for="signup-password-confirm">Confirm password</label>
              <input type="password" id="signup-password-confirm" name="password-confirm" required autocomplete="new-password" minlength="6" placeholder="Repeat your password">
            </div>
            <button type="submit" class="btn btn-primary" id="signup-submit">Create account</button>
          </form>
        </div>

        <p class="auth-footer-text">Already have an account? <a href="login.html">Sign in</a></p>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/tenant-storage.js"></script>
  <script src="js/auth.js"></script>
  <script>HFAuth.initSignupPage();</script>
</body>
</html>
